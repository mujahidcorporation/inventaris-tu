<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background:#f5f7fb;
    }

    .header{
      background:linear-gradient(135deg,#2563eb,#1e3a8a);
      color:white;
      padding:25px;
      border-radius:15px;
      margin-bottom:20px;
    }

    .card-stat{
      border:none;
      border-radius:15px;
      color:white;
    }

    .bg1{
      background:#2563eb;
    }

    .bg2{
      background:#16a34a;
    }

    .bg3{
      background:#dc2626;
    }

    .table-responsive{
      max-height:500px;
    }

  </style>

</head>
<body>

<div class="container py-4">

  <div class="header">
    <h2>📦 Inventaris Tata Usaha</h2>
    <p class="mb-0">Barang Masuk & Keluar</p>
  </div>

  <div class="row mb-4">

    <div class="col-md-4 mb-3">
      <div class="card card-stat bg1">
        <div class="card-body">
          <h6>Total Barang</h6>
          <h2 id="totalBarang">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card card-stat bg2">
        <div class="card-body">
          <h6>Total Stok</h6>
          <h2 id="totalStok">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card card-stat bg3">
        <div class="card-body">
          <h6>Stok Menipis</h6>
          <h2 id="stokMinim">0</h2>
        </div>
      </div>
    </div>

  </div>

  <div class="card shadow-sm mb-4">

    <div class="card-header">
      Input Barang
    </div>

    <div class="card-body">

      <div class="row g-3">

        <div class="col-md-2">
          <label>Kode Barang</label>
          <input id="kode" class="form-control">
        </div>

        <div class="col-md-3">
          <label>Nama Barang</label>
          <input id="nama" class="form-control">
        </div>

        <div class="col-md-2">
          <label>Satuan</label>
          <select id="satuan" class="form-select">
            <option>Pcs</option>
            <option>Box</option>
            <option>Pak</option>
            <option>Rim</option>
            <option>Unit</option>
            <option>Botol</option>
            <option>Lembar</option>
          </select>
        </div>

        <div class="col-md-2">
          <label>Jenis</label>
          <select id="jenis" class="form-select">
            <option value="Masuk">Masuk</option>
            <option value="Keluar">Keluar</option>
          </select>
        </div>

        <div class="col-md-2">
          <label>Jumlah</label>
          <input type="number" id="jumlah" class="form-control">
        </div>

        <div class="col-md-1 d-flex align-items-end">
          <button class="btn btn-primary w-100" onclick="simpan()">
            Simpan
          </button>
        </div>

      </div>

    </div>

  </div>

  <div class="card shadow-sm">

    <div class="card-header">
      Data Stok Barang
    </div>

    <div class="card-body">

      <div class="table-responsive">

        <table class="table table-bordered table-hover">

          <thead class="table-primary">
            <tr>
              <th>Kode</th>
              <th>Nama Barang</th>
              <th>Satuan</th>
              <th>Stok</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="tabelBarang"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script>

function loadBarang(){

  google.script.run
  .withSuccessHandler(function(data){

    let tabel = document.getElementById("tabelBarang");

    tabel.innerHTML = "";

    let totalStok = 0;
    let stokMinim = 0;

    data.forEach(function(row){

      totalStok += Number(row[3]);

      let status = `
        <span class="badge bg-success">
          Aman
        </span>
      `;

      if(Number(row[3]) <= 10){

        stokMinim++;

        status = `
          <span class="badge bg-danger">
            Menipis
          </span>
        `;
      }

      tabel.innerHTML += `
      <tr>
        <td>${row[0]}</td>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
        <td>${status}</td>
      </tr>
      `;

    });

    document.getElementById("totalBarang").innerText = data.length;
    document.getElementById("totalStok").innerText = totalStok;
    document.getElementById("stokMinim").innerText = stokMinim;

  }).getBarang();
}

function simpan(){

  const data = {

    kode: document.getElementById("kode").value.trim(),
    nama: document.getElementById("nama").value.trim(),
    satuan: document.getElementById("satuan").value,
    jenis: document.getElementById("jenis").value,
    jumlah: document.getElementById("jumlah").value

  };

  if(
    !data.kode ||
    !data.nama ||
    !data.jumlah
  ){
    alert("Lengkapi data terlebih dahulu");
    return;
  }

  google.script.run
  .withSuccessHandler(function(res){

    alert(res.message);

    document.getElementById("kode").value = "";
    document.getElementById("nama").value = "";
    document.getElementById("jumlah").value = "";

    loadBarang();

  })
  .simpanTransaksi(data);
}

loadBarang();

</script>

</body>
</html>
