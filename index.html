<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventaris TU</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  width:320px;
}

h1{
  margin-bottom:10px;
  font-size:26px;
}

p{
  font-size:14px;
  opacity:0.8;
  margin-bottom:25px;
}

.btn{
  display:inline-block;
  padding:15px 20px;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  text-decoration:none;
  border-radius:12px;
  font-weight:bold;
  transition:0.3s;
  width:100%;
}

.btn:hover{
  transform: scale(1.05);
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.footer{
  margin-top:15px;
  font-size:12px;
  opacity:0.6;
}
</style>

</head>
<body>

<div class="card">

  <h1>📦 Inventaris TU</h1>
  <p>Sistem Barang Masuk & Keluar Sekolah</p>

  <a class="btn" target="_blank"
     href="https://script.google.com/macros/s/AKfycbypPzhIL8sa_W97SKmkzRcVunhqEk-RD4VE88JYFU1FSq-pectu_FO5kfkvXb4MdQ/exec">
    🚀 Buka Aplikasi
  </a>

  <div class="footer">
    Muhammad Mujahidin Eko 
  </div>

</div>

</body>
</html>
